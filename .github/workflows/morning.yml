name: Morning Portfolio Report

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"   # 11:30 AM IST on weekdays

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate morning report
        run: python scripts/generate_report.py --session morning

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data reports
          git commit -m "Morning report update" || echo "No changes to commit"
          git push